spring:
  application:
    name: product-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/sffecommerce_product}
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

jwt:
  secret: c78ba16276efe5d5bc1661ff10ec1192b4fa364dc9147f60c76d3a71a0e5d960c68a5fad0ceee979c1faa5e3211c9397b6708eeb4ed01bb8d5f1641c6857d86a
  ##expiration: 86400000
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

internal:
  service-key: 12345

logging:
  level:
    com.denizbyrk.sffecommerce: DEBUG